name = "low_D_W"
description = "Lower W diffusion"

D_U  = 0.1
D_W  = 0.15
CHI  = 8.3
ALPHA = 1.0
BETA  = 0.73
GAMMA = 0.025
W_0   = 1.0

[[experiment]]
