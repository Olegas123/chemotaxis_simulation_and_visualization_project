# experiments.toml
# Configuration file for running batch simulations
#
# Each [[experiment]] section defines one complete simulation run.
# All 5 models (1D, 2D polar, 2D cylindrical, 2D combined, 3D) will be run
# with the same physical parameters.
#
# To add a new experiment, copy an [[experiment]] block and modify the parameters.

# =============================================================================
# EXPERIMENT 1: Baseline parameters
# =============================================================================
[[experiment]]
name = "baseline"
description = "Standard parameters from literature"

D_U  = 0.1
D_W  = 0.2
CHI  = 8.3
ALPHA = 1.0
BETA  = 0.73
GAMMA = 0.025
W_0   = 1.0

# =============================================================================
# CHI (chemotaxis) sweep
# =============================================================================
[[experiment]]
name = "high_chemotaxis"
description = "Increased chemotactic sensitivity"

D_U  = 0.1
D_W  = 0.2
CHI  = 8.8   # Increased from 8.3
ALPHA = 1.0
BETA  = 0.73
GAMMA = 0.025
W_0   = 1.0

[[experiment]]
name = "low_chemotaxis"
description = "Decreased chemotactic sensitivity"

D_U  = 0.1
D_W  = 0.2
CHI  = 7.8   # Decreased from 8.3
ALPHA = 1.0
BETA  = 0.73
GAMMA = 0.025
W_0   = 1.0

# =============================================================================
# D_U (U diffusion) sweep
# =============================================================================
[[experiment]]
name = "low_D_U"
description = "Lower U diffusion"

D_U  = 0.085
D_W  = 0.2
CHI  = 8.3
ALPHA = 1.0
BETA  = 0.73
GAMMA = 0.025
W_0   = 1.0

[[experiment]]
name = "high_D_U"
description = "Higher U diffusion"

D_U  = 0.115
D_W  = 0.2
CHI  = 8.3
ALPHA = 1.0
BETA  = 0.73
GAMMA = 0.025
W_0   = 1.0

# =============================================================================
# D_W (W diffusion) sweep
# =============================================================================
